title: ollyconn
tagline: notes on software and hardware
description: >
  Personal blog of John Connolly. Mostly software engineering, occasionally
  hardware hacking, with the dust blown off after a multi-year hiatus.

author:
  name: John Connolly
  email: john@ollyconn.com

url: "https://ollyconn.com"
baseurl: ""

image: /assets/img/sbu/sprawl.jpg
twitter:
  card: summary_large_image

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

show_excerpts: true

now_building: "local LLM stack on a Pi 5 + Hailo NPU vs. a spare MacBook. <a href='/2026/05/28/local-llm-pi5-vs-macbook/'>writeup landing soon</a>."

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - node_modules/
  - .sass-cache/
  - .jekyll-cache/
