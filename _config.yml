title: ollyconn
tagline: notes on software and hardware
description: >
  Personal blog of John Connolly. Mostly software engineering, occasionally
  hardware hacking, with the dust blown off after a multi-year hiatus.

author:
  name: John Connolly
  email: john@ollyconn.com

url: "https://ollyconn.com"
baseurl: ""

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

show_excerpts: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - node_modules/
  - .sass-cache/
  - .jekyll-cache/
